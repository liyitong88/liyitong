<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>debug</title>
    <style>
      body { font-family: monospace; white-space: pre-wrap; padding: 16px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <pre id="log"></pre>
    <script>
      window.onerror = function (msg, src, line, col, err) {
        document.getElementById('log').textContent += 'ONERROR: ' + msg + ' @ ' + line + ':' + col + '\n';
      };
      window.addEventListener('unhandledrejection', function (e) {
        document.getElementById('log').textContent += 'PROMISE: ' + e.reason + '\n';
      });
    </script>
    <script type="module" src="/assets/index-DGbQjcbh.js"></script>
  </body>
</html>
